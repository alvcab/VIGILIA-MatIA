[from-vto]
exten => 101,1,Goto(from-vto,1000,1)
exten => 1000,1,NoOp(VIGILIA inbound call from VTO)
 same => n,Answer()
 same => n,Set(SAFE_CALL_ID=${FILTER(0-9A-Za-z_-,${UNIQUEID})})
 same => n,Set(VIGILIA_FAST_FACE_FLAG=__VIGILIA_RUNTIME_DIR__/run/fast_face_${SAFE_CALL_ID}.flag)
 same => n,Set(VIGILIA_FAST_FACE_DONE_FLAG=__VIGILIA_RUNTIME_DIR__/run/fast_face_${SAFE_CALL_ID}.done)
 same => n,Set(VIGILIA_HELLO_FLAG=__VIGILIA_RUNTIME_DIR__/run/hello_${SAFE_CALL_ID}.flag)
 same => n,Set(VIGILIA_AUDIO_BASE=__VIGILIA_AUDIO_DIR__/vigilia_in_${SAFE_CALL_ID})
 same => n,Set(VIGILIA_RESPONSE_BASE=__VIGILIA_AUDIO_DIR__/vigilia_out_${SAFE_CALL_ID})
 same => n,Set(VIGILIA_PROMPT_BASE=__VIGILIA_AUDIO_DIR__/vigilia_prompt)
 same => n,Set(VIGILIA_LISTEN_BASE=__VIGILIA_AUDIO_DIR__/vigilia_listen)
 same => n,Set(VIGILIA_LOG=__VIGILIA_LOG_DIR__/vigilia_asterisk.log)
 same => n,System(__VIGILIA_PROJECT_DIR__/v1/asterisk/iniciar_captura_rtsp_temprana.sh ${VIGILIA_AUDIO_BASE} ${VIGILIA_LOG})
 same => n,GotoIf($["${STAT(e,__VIGILIA_RUNTIME_DIR__/vigilia_audio_only.flag)}" = "1"]?audio-only)
 same => n,NoOp(VIGILIA mode=normal)
 same => n,System(__VIGILIA_PROJECT_DIR__/scripts/play_vto_local_hello.sh ${VIGILIA_LOG} ${VIGILIA_HELLO_FLAG})
 same => n,GotoIf($["${STAT(e,__VIGILIA_RUNTIME_DIR__/vigilia_hello_only.flag)}" = "1"]?hello-only)
 same => n,System(__VIGILIA_PROJECT_DIR__/v1/asterisk/lanzar_fast_face_async.sh ${VIGILIA_FAST_FACE_FLAG} ${VIGILIA_LOG} ${VIGILIA_RESPONSE_BASE}.wav ${VIGILIA_HELLO_FLAG} ${VIGILIA_FAST_FACE_DONE_FLAG})
 same => n,NoOp(VIGILIA processing with early RTSP audio)
 same => n,System(__VIGILIA_PROJECT_DIR__/v1/asterisk/procesar_llamada_vto.sh ${VIGILIA_AUDIO_BASE}.wav ${VIGILIA_RESPONSE_BASE}.wav ${VIGILIA_LOG} ${VIGILIA_FAST_FACE_FLAG} ${VIGILIA_FAST_FACE_DONE_FLAG})
 same => n,NoOp(VIGILIA system status: ${SYSTEMSTATUS})
 same => n,NoOp(VIGILIA local response playback handled on iMac)
 same => n,Hangup()
 same => n(audio-only),NoOp(VIGILIA mode=audio_only)
 same => n,Wait(0.5)
 same => n,System(__VIGILIA_PROJECT_DIR__/v1/asterisk/procesar_llamada_vto.sh ${VIGILIA_AUDIO_BASE}.wav ${VIGILIA_RESPONSE_BASE}.wav ${VIGILIA_LOG})
 same => n,NoOp(VIGILIA audio-only status: ${SYSTEMSTATUS})
 same => n,Hangup()
 same => n(hello-only),Set(VIGILIA_PROMPT_BASE=__VIGILIA_AUDIO_DIR__/vigilia_prompt)
 same => n,Set(VIGILIA_LISTEN_BASE=__VIGILIA_AUDIO_DIR__/vigilia_listen)
 same => n,ExecIf($["${STAT(e,${VIGILIA_PROMPT_BASE}.wav)}" = "1"]?Playback(${VIGILIA_PROMPT_BASE}))
 same => n,Wait(0.2)
 same => n,ExecIf($["${STAT(e,${VIGILIA_LISTEN_BASE}.wav)}" = "1"]?Playback(${VIGILIA_LISTEN_BASE}))
 same => n,ExecIf($["${STAT(e,${VIGILIA_LISTEN_BASE}.wav)}" != "1"]?Playback(beep))
 same => n,Hangup()
