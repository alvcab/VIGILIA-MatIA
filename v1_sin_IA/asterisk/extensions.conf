[from-vto]
exten => 1000,1,NoOp(VIGILIA inbound call from VTO)
 same => n,Answer()
 same => n,Set(SAFE_CALL_ID=${FILTER(0-9A-Za-z_-,${UNIQUEID})})
 same => n,Set(VIGILIA_AUDIO_BASE=/tmp/vigilia_in_${SAFE_CALL_ID})
 same => n,Set(VIGILIA_RESPONSE_BASE=/tmp/vigilia_out_${SAFE_CALL_ID})
 same => n,Set(VIGILIA_PROMPT_BASE=/tmp/vigilia_prompt)
 same => n,Set(VIGILIA_LOG=/tmp/vigilia_asterisk.log)
 same => n,ExecIf($["${STAT(e,${VIGILIA_PROMPT_BASE}.wav)}" = "1"]?Playback(${VIGILIA_PROMPT_BASE}))
 same => n,ExecIf($["${STAT(e,${VIGILIA_PROMPT_BASE}.wav)}" != "1"]?Playback(beep))
 same => n,WaitForNoise(250,1,3)
 same => n,NoOp(VIGILIA wait for noise status: ${WAITSTATUS})
 same => n,ExecIf($["${WAITSTATUS}" != "TIMEOUT"]?MixMonitor(${VIGILIA_AUDIO_BASE}.wav))
 same => n,ExecIf($["${WAITSTATUS}" != "TIMEOUT"]?WaitForSilence(1200,1,8))
 same => n,NoOp(VIGILIA wait for silence status: ${WAITSTATUS})
 same => n,ExecIf($["${WAITSTATUS}" != "TIMEOUT"]?StopMixMonitor())
 same => n,Wait(0.2)
 same => n,Set(VIGILIA_AUDIO_EXISTS=${STAT(e,${VIGILIA_AUDIO_BASE}.wav)})
 same => n,NoOp(VIGILIA recorded file: ${VIGILIA_AUDIO_BASE}.wav)
 same => n,NoOp(VIGILIA audio exists: ${VIGILIA_AUDIO_EXISTS})
 same => n,ExecIf($["${VIGILIA_AUDIO_EXISTS}" = "1"]?System(/Users/alvaroc/Proyectos/VIGILIA-MatIA/v1_sin_IA/asterisk/procesar_llamada_vto.sh ${VIGILIA_AUDIO_BASE}.wav ${VIGILIA_RESPONSE_BASE}.wav ${VIGILIA_LOG}))
 same => n,NoOp(VIGILIA system status: ${SYSTEMSTATUS})
 same => n,ExecIf($["${SYSTEMSTATUS}" = "SUCCESS" & "${STAT(e,${VIGILIA_RESPONSE_BASE}.wav)}" = "1"]?Playback(${VIGILIA_RESPONSE_BASE}))
 same => n,Hangup()
